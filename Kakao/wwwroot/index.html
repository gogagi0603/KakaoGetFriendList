<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 친구 목록</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f7f7f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; width: 100%; max-width: 900px; }
        header h1 { font-size: 24px; color: #3C1E1E; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #ddd; }
        .user-name { font-size: 14px; font-weight: 600; color: #3C1E1E; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-email { font-size: 12px; color: #888; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-kakao {
            background: #FEE500; color: #3C1E1E; border: none;
            padding: 14px 28px; border-radius: 8px; font-size: 16px;
            font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-kakao:hover { background: #F0D800; }
        .btn-logout {
            background: #eee; color: #555; border: none;
            padding: 8px 16px; border-radius: 6px; font-size: 14px;
            cursor: pointer; text-decoration: none; margin-left: auto;
        }
        .btn-logout:hover { background: #ddd; }
        .btn-excel {
            background: #217346; color: #fff; border: none;
            padding: 8px 16px; border-radius: 6px; font-size: 14px;
            font-weight: 600; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-excel:hover { background: #1a5c38; }
        .btn-excel:disabled { background: #aaa; cursor: not-allowed; }
        .btn-reselect {
            background: #fff; color: #3C1E1E; border: 2px solid #FEE500;
            padding: 8px 16px; border-radius: 6px; font-size: 14px;
            font-weight: 600; cursor: pointer;
        }
        .btn-reselect:hover { background: #FFFDE0; }
        #status { color: #888; margin-bottom: 16px; font-size: 14px; }
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px; width: 100%; max-width: 900px;
        }
        .friend-card {
            background: white; border-radius: 12px; padding: 16px;
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .friend-card img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #ddd; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .login-box {
            text-align: center; background: white; border-radius: 16px;
            padding: 48px 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .login-box p { color: #666; margin-bottom: 24px; }
        .picker-box {
            text-align: center; background: white; border-radius: 16px;
            padding: 48px 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: 100%; max-width: 500px;
        }
        .picker-box p { color: #666; margin-bottom: 8px; font-size: 15px; }
        .picker-box .hint { color: #aaa; font-size: 13px; margin-bottom: 28px; }
        .error-box {
            background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 12px;
            padding: 24px; width: 100%; max-width: 900px;
        }
        .error-box h3 { color: #c62828; margin-bottom: 12px; }
        .error-box pre { font-size: 13px; color: #333; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <header>
        <h1>카카오 친구 목록</h1>
        <div id="user-info" class="user-info" style="display:none">
            <img id="user-avatar" class="user-avatar" alt="프로필">
            <div>
                <div id="user-name" class="user-name"></div>
                <div id="user-email" class="user-email"></div>
            </div>
            <a href="/logout" class="btn-logout">로그아웃</a>
        </div>
    </header>

    <div id="login-box" class="login-box" style="display:none">
        <p>카카오 계정으로 로그인하여 친구 목록을 불러오세요.</p>
        <a href="/login" class="btn-kakao">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#3C1E1E">
                <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.743 1.617 5.157 4.077 6.617L5.04 21l4.42-2.897A11.67 11.67 0 0012 18.6c5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/>
            </svg>
            카카오 로그인
        </a>
    </div>

    <div id="error-box" class="error-box" style="display:none">
        <h3>오류</h3>
        <pre id="error-msg"></pre>
        <br>
        <a href="/login" class="btn-kakao" style="display:inline-flex">다시 로그인</a>
    </div>

    <div id="picker-box" class="picker-box" style="display:none">
        <p>카카오톡 친구 목록에서 원하는 친구를 선택하세요.</p>
        <p class="hint">서비스 미가입 친구도 포함되어 표시됩니다.</p>
        <button class="btn-kakao" style="margin:0 auto;" onclick="openPicker()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#3C1E1E">
                <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.743 1.617 5.157 4.077 6.617L5.04 21l4.42-2.897A11.67 11.67 0 0012 18.6c5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/>
            </svg>
            친구 선택하기
        </button>
    </div>

    <div id="friends-box" style="display:none; width:100%; max-width:900px;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <div id="status" style="margin:0; flex:1; color:#888; font-size:14px;"></div>
            <button class="btn-reselect" onclick="openPicker()">다시 선택</button>
            <button id="btn-export" class="btn-excel" onclick="exportExcel()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM12 17l-4-4h2.5v-4h3v4H16l-4 4z"/>
                </svg>
                엑셀 다운로드
            </button>
        </div>
        <div id="friends-list" class="friends-grid"></div>
    </div>

    <div id="loading" style="color:#aaa">불러오는 중...</div>

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
            integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
            crossorigin="anonymous"></script>
    <script>
        let pickedFriends = [];

        function svgAvatar(label, size) {
            const ch = (label || '?')[0];
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" rx="${size}" fill="#FEE500"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="#3C1E1E" font-size="${Math.round(size * 0.45)}" font-family="sans-serif">${ch}</text></svg>`;
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        async function loadUserInfo() {
            const res = await fetch('/api/me');
            if (!res.ok) return;
            const user = await res.json();
            document.getElementById('user-info').style.display = 'flex';
            document.getElementById('user-name').textContent = user.nickname || '';
            document.getElementById('user-email').textContent = user.email || '';
            const avatar = document.getElementById('user-avatar');
            avatar.onerror = () => { avatar.onerror = null; avatar.src = svgAvatar(user.nickname, 36); };
            avatar.src = user.thumbnailImageUrl || svgAvatar(user.nickname, 36);
        }

        async function init() {
            const [configRes, tokenRes] = await Promise.all([
                fetch('/api/kakao-config'),
                fetch('/api/token-for-picker')
            ]);

            document.getElementById('loading').style.display = 'none';

            if (tokenRes.status === 401) {
                document.getElementById('login-box').style.display = 'block';
                return;
            }

            if (!configRes.ok || !tokenRes.ok) {
                document.getElementById('error-box').style.display = 'block';
                document.getElementById('error-msg').textContent = '서버 설정을 불러오지 못했습니다.';
                return;
            }

            const config = await configRes.json();
            const tokenData = await tokenRes.json();

            if (!config.javascriptKey) {
                document.getElementById('error-box').style.display = 'block';
                document.getElementById('error-msg').textContent = 'Kakao:JavascriptKey가 appsettings.json에 설정되지 않았습니다.';
                return;
            }

            if (!Kakao.isInitialized()) {
                Kakao.init(config.javascriptKey);
            }
            Kakao.Auth.setAccessToken(tokenData.accessToken);

            await loadUserInfo();
            document.getElementById('picker-box').style.display = 'block';
        }

        async function openPicker() {
            try {
                const response = await Kakao.Picker.selectFriends({
                    title: '친구 선택',
                    maxPickableCount: 500,
                    minPickableCount: 1,
                    enableSearch: true,
                    showFavorite: true,
                    showPickedFriend: true,
                });

                pickedFriends = response.users || [];
                renderFriends(pickedFriends);
            } catch (e) {
                const msg = e?.message || (typeof e === 'string' ? e : JSON.stringify(e));
                // 사용자가 팝업을 직접 닫은 경우 무시
                if (msg && (msg.includes('cancel') || msg.includes('Cancel'))) return;
                console.error('Picker error:', e);
                document.getElementById('error-box').style.display = 'block';
                document.getElementById('error-msg').textContent =
                    '[Picker 오류]\n' + (msg || '알 수 없는 오류') +
                    '\n\n확인사항:\n1. 카카오 개발자 콘솔 > 플랫폼 > Web 에 이 사이트 도메인 등록 여부\n2. 카카오 로그인 > 동의항목 > 카카오톡 친구 목록 활성화 여부';
                document.getElementById('picker-box').style.display = 'none';
                document.getElementById('friends-box').style.display = 'none';
            }
        }

        function renderFriends(friends) {
            document.getElementById('picker-box').style.display = 'none';
            document.getElementById('friends-box').style.display = 'block';
            document.getElementById('status').textContent = `${friends.length}명 선택됨`;

            const list = document.getElementById('friends-list');
            if (friends.length === 0) {
                list.innerHTML = '<p style="color:#aaa">선택된 친구가 없습니다.</p>';
                return;
            }

            list.innerHTML = friends.map(f => {
                const name = f.profile_nickname || '?';
                const thumb = f.profile_thumbnail_image;
                const firstChar = name[0];
                return `
                    <div class="friend-card">
                        <img
                            src="${thumb || svgAvatar(name, 48)}"
                            onerror="this.onerror=null;this.src=svgAvatar('${firstChar}',48)"
                            alt="${name}">
                        <div class="friend-info">
                            <div class="friend-name">${name}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function exportExcel() {
            if (pickedFriends.length === 0) {
                alert('먼저 친구를 선택해주세요.');
                return;
            }
            const btn = document.getElementById('btn-export');
            btn.disabled = true;
            btn.textContent = '생성 중...';
            try {
                const res = await fetch('/api/friends/picker-export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pickedFriends)
                });
                if (!res.ok) { alert('엑셀 생성에 실패했습니다.'); return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `청첩장_발송목록_${new Date().toISOString().slice(0,10)}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM12 17l-4-4h2.5v-4h3v4H16l-4 4z"/></svg> 엑셀 다운로드`;
            }
        }

        init();
    </script>
</body>
</html>
